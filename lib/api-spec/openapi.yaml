openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: PWR Risk Review Coordinator API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: requests
    description: Risk review requests
  - name: meetings
    description: Meetings
  - name: email-drafts
    description: Email drafts
  - name: rules
    description: Rules and classification
  - name: notes
    description: Notes
  - name: status
    description: Status workflow
  - name: calendar
    description: Calendar previews
  - name: dashboard
    description: Dashboard summaries
  - name: config
    description: Configuration and admin
  - name: auth
    description: Browser and mobile authentication endpoints.
  - name: users
    description: User and role management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /requests:
    get:
      operationId: listRequests
      tags: [requests]
      summary: List all risk review requests
      responses:
        "200":
          description: List of requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RiskReviewRequest"
    post:
      operationId: createRequest
      tags: [requests]
      summary: Create a risk review request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiskReviewRequestInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskReviewRequestDetail"

  /requests/{id}:
    get:
      operationId: getRequest
      tags: [requests]
      summary: Get a request with full detail
      parameters:
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Request detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskReviewRequestDetail"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateRequest
      tags: [requests]
      summary: Update a request
      parameters:
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiskReviewRequestUpdate"
      responses:
        "200":
          description: Updated request detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskReviewRequestDetail"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteRequest
      tags: [requests]
      summary: Delete a request
      parameters:
        - $ref: "#/components/parameters/RequestId"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /requests/{id}/classify:
    post:
      operationId: classifyRequest
      tags: [rules]
      summary: Re-run classification and validation for a request
      parameters:
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Classification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassificationResult"
        "404":
          $ref: "#/components/responses/NotFound"

  /requests/{id}/meetings:
    get:
      operationId: listRequestMeetings
      tags: [meetings]
      summary: List meetings for a request
      parameters:
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Meetings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Meeting"
    post:
      operationId: createMeeting
      tags: [meetings]
      summary: Add a meeting to a request
      parameters:
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeetingInput"
      responses:
        "201":
          description: Created meeting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meeting"

  /meetings:
    get:
      operationId: listMeetings
      tags: [meetings]
      summary: List all meetings
      responses:
        "200":
          description: Meetings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MeetingWithRequest"

  /meetings/{id}:
    put:
      operationId: updateMeeting
      tags: [meetings]
      summary: Update a meeting
      parameters:
        - $ref: "#/components/parameters/MeetingId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeetingUpdate"
      responses:
        "200":
          description: Updated meeting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meeting"
        "404":
          $ref: "#/components/responses/NotFound"

  /requests/{id}/email-drafts:
    get:
      operationId: listEmailDrafts
      tags: [email-drafts]
      summary: List email drafts for a request
      parameters:
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Email drafts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailDraft"

  /requests/{id}/email-drafts/generate:
    post:
      operationId: generateEmailDrafts
      tags: [email-drafts]
      summary: Generate editable email drafts for a request
      parameters:
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateDraftsInput"
      responses:
        "201":
          description: Generated drafts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailDraft"

  /email-drafts/{id}:
    put:
      operationId: updateEmailDraft
      tags: [email-drafts]
      summary: Update an email draft
      parameters:
        - $ref: "#/components/parameters/EmailDraftId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailDraftUpdate"
      responses:
        "200":
          description: Updated draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailDraft"
        "404":
          $ref: "#/components/responses/NotFound"

  /requests/{id}/notes:
    get:
      operationId: listNotes
      tags: [notes]
      summary: List notes for a request
      parameters:
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"
    post:
      operationId: createNote
      tags: [notes]
      summary: Add a note to a request
      parameters:
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "201":
          description: Created note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /requests/{id}/status:
    post:
      operationId: changeStatus
      tags: [status]
      summary: Change request status and record history
      parameters:
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusChangeInput"
      responses:
        "200":
          description: Updated request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskReviewRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /requests/{id}/status-history:
    get:
      operationId: listStatusHistory
      tags: [status]
      summary: List status history for a request
      parameters:
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Status history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatusHistoryEntry"

  /requests/{id}/calendar-preview:
    post:
      operationId: generateCalendarPreview
      tags: [calendar]
      summary: Generate calendar invite preview data (no real event created)
      parameters:
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarPreviewInput"
      responses:
        "200":
          description: Calendar preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarPreview"
        "404":
          $ref: "#/components/responses/NotFound"

  /risk-triggers:
    get:
      operationId: listRiskTriggers
      tags: [rules]
      summary: List master risk triggers
      responses:
        "200":
          description: Risk triggers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RiskTrigger"

  /rule-sets:
    get:
      operationId: listRuleSets
      tags: [rules]
      summary: List configurable rule sets
      responses:
        "200":
          description: Rule sets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RuleSet"

  /email-templates:
    get:
      operationId: listEmailTemplates
      tags: [config]
      summary: List email templates
      responses:
        "200":
          description: Email templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailTemplate"

  /risk-triggers/{id}:
    put:
      operationId: updateRiskTrigger
      tags: [rules]
      summary: Update a risk trigger
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiskTriggerUpdate"
      responses:
        "200":
          description: Updated risk trigger
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskTrigger"
        "404":
          $ref: "#/components/responses/NotFound"

  /email-templates/{id}:
    put:
      operationId: updateEmailTemplate
      tags: [config]
      summary: Update an email template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailTemplateUpdate"
      responses:
        "200":
          description: Updated email template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTemplate"
        "404":
          $ref: "#/components/responses/NotFound"

  /rule-sets/{id}:
    put:
      operationId: updateRuleSet
      tags: [rules]
      summary: Update a rule set
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleSetUpdate"
      responses:
        "200":
          description: Updated rule set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleSet"
        "404":
          $ref: "#/components/responses/NotFound"

  /config:
    get:
      operationId: getConfig
      tags: [config]
      summary: Get configuration options (enums and static rules)
      responses:
        "200":
          description: Configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppConfig"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary card counts
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /usage:
    get:
      operationId: listUsageEvents
      tags: [usage]
      summary: List recent usage-tracking events
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Recent usage events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UsageEvent"
    post:
      operationId: recordUsageEvent
      tags: [usage]
      summary: Record a usage-tracking event (open to any platform)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordUsageBody"
      responses:
        "201":
          description: Created usage event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageEvent"

  /usage/summary:
    get:
      operationId: getUsageSummary
      tags: [usage]
      summary: Aggregated usage impact (hours and dollars saved)
      responses:
        "200":
          description: Usage impact summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageSummary"

  /import/tracker:
    post:
      operationId: importTracker
      tags: [config]
      summary: Import the legacy risk-review tracker spreadsheet
      description: >
        Upload a legacy .xlsx/.xls/.csv tracker export and run the same staging
        and import logic as the CLI importer. Use dryRun=true to preview what
        would be imported without writing any data.
      parameters:
        - name: dryRun
          in: query
          required: false
          description: When true, classify and report without writing any data.
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/TrackerUpload"
      responses:
        "200":
          description: Import summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportSummary"
        "400":
          description: Invalid upload or unreadable file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/user:
    get:
      tags: [auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.
  /logout:
    get:
      tags: [auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /users:
    get:
      tags: [users]
      operationId: listUsers
      summary: List all users and their roles (admin only)
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ManagedUser'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [users]
      operationId: createUser
      summary: Pre-add a user by email and assign a role (admin only)
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewUser'
      responses:
        '201':
          description: Created user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagedUser'
        '400':
          description: Invalid user details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: A user with this email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /users/{id}/role:
    patch:
      tags: [users]
      operationId: updateUserRole
      summary: Change a user's role (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRoleUpdate'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagedUser'
        '400':
          description: Invalid role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    RequestId:
      name: id
      in: path
      required: true
      schema:
        type: integer
    MeetingId:
      name: id
      in: path
      required: true
      schema:
        type: integer
    EmailDraftId:
      name: id
      in: path
      required: true
      schema:
        type: integer
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    RiskTrigger:
      type: object
      required:
        - id
        - triggerNumber
        - triggerName
        - isMajorOpportunityTrigger
        - active
      properties:
        id:
          type: integer
        triggerNumber:
          type: integer
        triggerName:
          type: string
        triggerDescription:
          type: ["string", "null"]
        isMajorOpportunityTrigger:
          type: boolean
        active:
          type: boolean

    Attendee:
      type: object
      required:
        - id
        - requestId
        - role
      properties:
        id:
          type: integer
        requestId:
          type: integer
        name:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        role:
          type: string
        attendeeType:
          type: ["string", "null"]
        source:
          type: ["string", "null"]
        isRequired:
          type: boolean

    AttendeeInput:
      type: object
      required:
        - role
      properties:
        name:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        role:
          type: string
        attendeeType:
          type: ["string", "null"]
        source:
          type: ["string", "null"]
        isRequired:
          type: boolean

    Meeting:
      type: object
      required:
        - id
        - requestId
        - meetingType
        - status
        - rescheduledCount
      properties:
        id:
          type: integer
        requestId:
          type: integer
        meetingType:
          type: string
        targetDate:
          type: ["string", "null"]
        scheduledStart:
          type: ["string", "null"]
        scheduledEnd:
          type: ["string", "null"]
        timezone:
          type: ["string", "null"]
        subject:
          type: ["string", "null"]
        body:
          type: ["string", "null"]
        teamsLink:
          type: ["string", "null"]
        outlookEventId:
          type: ["string", "null"]
        status:
          type: string
        riskLead:
          type: ["string", "null"]
        rescheduledCount:
          type: integer
        notes:
          type: ["string", "null"]

    MeetingWithRequest:
      type: object
      required:
        - id
        - requestId
        - meetingType
        - status
        - rescheduledCount
      properties:
        id:
          type: integer
        requestId:
          type: integer
        meetingType:
          type: string
        targetDate:
          type: ["string", "null"]
        scheduledStart:
          type: ["string", "null"]
        scheduledEnd:
          type: ["string", "null"]
        timezone:
          type: ["string", "null"]
        subject:
          type: ["string", "null"]
        body:
          type: ["string", "null"]
        teamsLink:
          type: ["string", "null"]
        outlookEventId:
          type: ["string", "null"]
        status:
          type: string
        riskLead:
          type: ["string", "null"]
        rescheduledCount:
          type: integer
        notes:
          type: ["string", "null"]
        projectName:
          type: ["string", "null"]
        clientName:
          type: ["string", "null"]
        crmOpportunityNumber:
          type: ["string", "null"]
        requiredAttendees:
          type: array
          items:
            type: string
        optionalAttendees:
          type: array
          items:
            type: string

    MeetingInput:
      type: object
      required:
        - meetingType
      properties:
        meetingType:
          type: string
        targetDate:
          type: ["string", "null"]
        scheduledStart:
          type: ["string", "null"]
        scheduledEnd:
