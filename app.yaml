command: ["sh", "-c", "echo \"PGHOST=[$PGHOST] PGPORT=[$PGPORT] PGDATABASE=[$PGDATABASE] PGUSER=[$PGUSER]\" && export DATABASE_URL=\"postgresql://${PGUSER}@${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=require\" && echo \"DATABASE_URL=[$DATABASE_URL]\" && NODE_ENV=production node --enable-source-maps artifacts/api-server/dist/index.mjs"]

resources:
  - name: pwr-risk-review-db
    lakebase:
      project: pwr-risk-review-coordinator
      branch: production
      database: databricks-postgres
      permission: read_write
