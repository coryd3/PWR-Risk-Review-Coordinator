command:
  - sh
  - -c
  - |
    export PGHOST=ep-falling-boat-e9olxvgd.database.eastus.azuredatabricks.net
    export PGPORT=5432
    export PGDATABASE=databricks_postgres
    export PGUSER=defe8fd5-7321-4702-943e-3a2c73c09a57
    export PGSSLMODE=require
    echo "Generating Lakebase DB credential via Python SDK..."
    PGPASSWORD=$(python3 -c "
from databricks.sdk import WorkspaceClient
import uuid
w = WorkspaceClient()
cred = w.database.generate_database_credential(request_id=str(uuid.uuid4()), instance_names=['databricks_postgres'])
print(cred.token)
" 2>&1)
    if echo "$PGPASSWORD" | grep -q "^ey"; then
      export PGPASSWORD
      echo "DB credential obtained (JWT token)"
    else
      echo "ERROR generating credential: $PGPASSWORD"
    fi
    NODE_ENV=production exec node --enable-source-maps artifacts/api-server/dist/index.mjs

resources:
  - name: pwr-risk-review-db
    lakebase:
      project: pwr-risk-review-coordinator
      branch: production
      database: databricks_postgres
      permission: read_write
