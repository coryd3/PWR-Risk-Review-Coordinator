kind = "web"
previewPath = "/"
title = "PWR Risk Review Coordinator"
version = "1.0.0"
id = "artifacts/risk-coordinator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21518

[services.development]
run = "pnpm --filter @workspace/risk-coordinator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/risk-coordinator", "run", "build" ]
publicDir = "artifacts/risk-coordinator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21518"
BASE_PATH = "/"
